<div style="display: flex; height: calc(100vh - 64px);">
  <div style="width: 250px; border-right: 1px solid #ccc; padding: 16px;">
    <h3>Заводчики</h3>
    <ul style="list-style: none; padding: 0;">
      <li *ngFor="let user of users" 
          (click)="selectUser(user)" 
          style="padding: 8px; cursor: pointer; border-bottom: 1px solid #eee;"
          [style.background-color]="selectedUser?.id === user.id ? '#e0e0e0' : 'transparent'">
        {{ user.username }}
      </li>
    </ul>
  </div>

  <div style="flex: 1; display: flex; flex-direction: column; padding: 16px;" *ngIf="selectedUser; else noUser">
    <h3>Чат с {{ selectedUser.username }}</h3>
    <div style="flex: 1; overflow-y: auto; border: 1px solid #eee; padding: 8px; margin-bottom: 8px;">
      <div *ngFor="let msg of messages" style="margin-bottom: 8px;">
        <strong>{{ msg.sender_username }}:</strong> {{ msg.text }}
      </div>
    </div>
    <div style="display: flex; gap: 8px;">
      <mat-form-field style="flex: 1;">
        <input matInput [(ngModel)]="newMessage" (keyup.enter)="send()" placeholder="Введите сообщение">
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="send()">Отправить</button>
    </div>
  </div>

  <ng-template #noUser>
    <div style="flex: 1; padding: 16px; color: #888;">
      Выберите заводчика, чтобы начать чат.
    </div>
  </ng-template>
</div>
