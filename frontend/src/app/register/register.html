<div style="max-width: 400px; margin: 50px auto; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-radius: 8px;">
  <h2>Регистрация</h2>
  <form (ngSubmit)="onSubmit()" #regForm="ngForm">
    <mat-form-field appearance="fill" style="width: 100%; margin-bottom: 16px;">
      <mat-label>Имя пользователя</mat-label>
      <input matInput type="text" [(ngModel)]="username" name="username" required>
      <mat-error *ngIf="regForm.controls['username']?.invalid && (regForm.controls['username']?.touched || regForm.submitted)">
        Имя пользователя обязательно
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" style="width: 100%; margin-bottom: 16px;">
      <mat-label>Email</mat-label>
      <input matInput type="email" [(ngModel)]="email" name="email" required email>
      <mat-error *ngIf="regForm.controls['email']?.invalid && (regForm.controls['email']?.touched || regForm.submitted)">
        Введите корректный email
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" style="width: 100%; margin-bottom: 16px;">
      <mat-label>Пароль</mat-label>
      <input matInput type="password" [(ngModel)]="password" name="password" required minlength="8">
      <mat-error *ngIf="regForm.controls['password']?.invalid && (regForm.controls['password']?.touched || regForm.submitted)">
        Минимум 8 символов
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" style="width: 100%; margin-bottom: 16px;">
      <mat-label>Повторите пароль</mat-label>
      <input matInput type="password" [(ngModel)]="password2" name="password2" required>
      <mat-error *ngIf="regForm.controls['password2']?.invalid && (regForm.controls['password2']?.touched || regForm.submitted)">
        Подтверждение обязательно
      </mat-error>
    </mat-form-field>

    <div *ngIf="errorMessage" style="color: red; margin-bottom: 16px;">{{ errorMessage }}</div>

    <button mat-raised-button color="primary" type="submit" style="width: 100%;"
            [disabled]="isSubmitting">
      {{ isSubmitting ? 'Регистрация...' : 'Зарегистрироваться' }}
    </button>
  </form>
  <p style="margin-top: 16px;">Уже есть аккаунт? <a routerLink="/login">Войти</a></p>
</div>
